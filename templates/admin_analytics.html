<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Analytics - Hotspot Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #3498db;
            --secondary: #2c3e50;
            --success: #2ecc71;
            --bg: #f0f2f5;
            --sidebar-width: 260px;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; color: #333; }
        
        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background: var(--secondary); color: white; min-height: 100vh; padding: 0; display: flex; flex-direction: column; position: fixed; transition: 0.3s; z-index: 1000; }
        .sidebar-header { padding: 30px 20px; text-align: center; background: rgba(0,0,0,0.1); }
        .sidebar-header h2 { margin: 0; font-size: 20px; letter-spacing: 1px; }
        .sidebar-nav { flex: 1; padding: 20px 0; }
        .sidebar-nav a { color: rgba(255,255,255,0.7); text-decoration: none; display: flex; align-items: center; padding: 12px 25px; transition: 0.2s; border-left: 4px solid transparent; margin-bottom: 5px; }
        .sidebar-nav a i { width: 25px; font-size: 18px; margin-right: 10px; }
        .sidebar-nav a:hover { color: white; background: rgba(255,255,255,0.05); }
        .sidebar-nav a.active { color: white; background: rgba(255,255,255,0.1); border-left-color: var(--primary); }
        .sidebar-footer { padding: 20px; font-size: 11px; opacity: 0.5; border-top: 1px solid rgba(255,255,255,0.05); }

        /* Main Content */
        .main { flex: 1; margin-left: var(--sidebar-width); padding: 30px; box-sizing: border-box; width: calc(100% - var(--sidebar-width)); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { margin: 0; font-size: 24px; font-weight: 600; }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; align-items: center; }
        .stat-icon { width: 50px; height: 50px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-right: 20px; }
        .stat-info h3 { margin: 0; font-size: 13px; text-transform: uppercase; color: #7f8c8d; }
        .stat-info p { margin: 5px 0 0; font-size: 24px; font-weight: 700; color: var(--secondary); }
        
        .bg-blue { background: #e1f5fe; color: #03a9f4; }
        .bg-green { background: #e8f5e9; color: #4caf50; }
        .bg-purple { background: #f3e5f5; color: #9c27b0; }

        .chart-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); height: 400px; margin-bottom: 30px; }

        @media (max-width: 1024px) {
            .sidebar { width: 70px; }
            .sidebar-header h2, .sidebar-footer, .sidebar-nav span { display: none; }
            .sidebar-nav a { justify-content: center; padding: 15px 0; }
            .main { margin-left: 70px; width: calc(100% - 70px); padding: 20px; }
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; width: 100%; padding: 15px; }
            .stats-grid { grid-template-columns: 1fr; }
            .chart-container { height: 300px; padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2><i class="fa-solid fa-wifi"></i> HOTSPOT</h2>
        </div>
        <div class="sidebar-nav">
            <a href="/admin"><i class="fa-solid fa-ticket"></i> <span>Vouchers</span></a>
            <a href="/admin/online"><i class="fa-solid fa-users"></i> <span>Online Users</span></a>
            <a href="/admin/analytics" class="active"><i class="fa-solid fa-chart-line"></i> <span>Analytics</span></a>
            <a href="/admin/settings"><i class="fa-solid fa-gear"></i> <span>Settings</span></a>
            <a href="/admin/export" style="color: #f39c12; margin-top: 20px;"><i class="fa-solid fa-file-export"></i> <span>Export CSV</span></a>
        </div>
        <div class="sidebar-footer">
            Naboth Tech Solutions<br>v2.0 &copy; 2026
        </div>
    </div>

    <div class="main">
        <div class="header">
            <h1>System Analytics</h1>
            <a href="/admin/logout" style="color: #e74c3c; text-decoration: none; font-weight: 600;"><i class="fa-solid fa-power-off"></i> Logout</a>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon bg-green"><i class="fa-solid fa-dollar-sign"></i></div>
                <div class="stat-info">
                    <h3>Total Revenue</h3>
                    <p>${{ "{:,.2f}".format(stats.total_revenue) }}</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon bg-blue"><i class="fa-solid fa-receipt"></i></div>
                <div class="stat-info">
                    <h3>Vouchers Sold</h3>
                    <p>{{ stats.total_vouchers_used|int }}</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon bg-purple"><i class="fa-solid fa-print"></i></div>
                <div class="stat-info">
                    <h3>Total Production</h3>
                    <p>{{ stats.total_vouchers_generated|int }}</p>
                </div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="revenueChart"></canvas>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('revenueChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: {{ revenue_chart.days|tojson }},
                datasets: [{
                    label: 'Daily Revenue ($)',
                    data: {{ revenue_chart.revenues|tojson }},
                    backgroundColor: 'rgba(52, 152, 219, 0.6)',
                    borderColor: 'rgba(52, 152, 219, 1)',
                    borderWidth: 1,
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    title: { display: true, text: 'Revenue Trend (Last 7 Days)', font: { size: 16 } }
                },
                scales: {
                    y: { beginAtZero: true, grid: { display: true, color: '#f0f2f5' } },
                    x: { grid: { display: false } }
                }
            }
        });
    </script>
</body>
</html>
