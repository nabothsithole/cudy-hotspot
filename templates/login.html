<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wi-Fi Login</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 35px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #eee; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #3498db; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Connect to Wi-Fi</h2>
        <p>Device: {{ mac or 'New User' }}</p>
        
        <form action="/auth" method="POST">
            <input type="hidden" name="mac" value="{{ mac }}">
            <input type="hidden" name="gw_url" value="{{ gw_url }}">
            <input type="text" name="voucher" placeholder="Enter Voucher Code" required>
            <button type="submit">CONNECT NOW</button>
        </form>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <p style="color: red; font-size: 14px;">{{ messages[0] }}</p>
            {% endif %}
        {% endwith %}

        <div style="margin-top: 30px; font-size: 11px; color: #bdc3c7; border-top: 1px solid #eee; pt-15px; padding-top: 15px;">
            Powered by <strong>Naboth Tech Solutions</strong> &copy; 2026
        </div>
    </div>
</body>
</html>
