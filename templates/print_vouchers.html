<!DOCTYPE html>
<html>
<head>
    <title>Print Vouchers - Naboth Tech</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .voucher-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .voucher-card { 
            border: 2px dashed #333; 
            padding: 15px; 
            text-align: center; 
            border-radius: 8px; 
            background: #fff;
        }
        .code { font-size: 20px; font-weight: 800; color: #2c3e50; margin: 10px 0; display: block; }
        .duration { font-size: 12px; text-transform: uppercase; color: #7f8c8d; }
        .brand { font-size: 10px; font-weight: bold; color: #3498db; }
        
        @media print {
            .no-print { display: none; }
            body { padding: 0; }
        }
    </style>
</head>
<body>
    <div class="no-print" style="margin-bottom: 30px; background: #f8f9fa; padding: 15px; border-radius: 8px; display: flex; align-items: center; gap: 20px;">
        <div style="flex: 1;">
            <h2 style="margin: 0;">Ready to Print</h2>
            <p style="margin: 5px 0 0 0;">Cut along the dashed lines after printing.</p>
        </div>
        <a href="/admin" style="text-decoration: none;">
            <button style="padding: 10px 20px; background: #7f8c8d; color: white; border: none; border-radius: 5px; cursor: pointer;">BACK TO DASHBOARD</button>
        </a>
        <button onclick="window.print()" style="padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">PRINT NOW</button>
    </div>

    <div class="voucher-grid">
        {% for v in vouchers %}
        <div class="voucher-card">
            <div class="brand">HIGH-SPEED WI-FI</div>
            <span class="code">{{ v[0] }}</span>
            <div class="duration">VALID FOR: {{ v[1] }} DAY(S)</div>
            <div style="font-size: 8px; margin-top: 5px;">Managed by Naboth Tech</div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
